---
apiVersion: v1
kind: Namespace
metadata:
  name: emd

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: emd-agent-config
  namespace: emd
data:
  agent.toml: |
    # Populate from your site-specific agent.toml:
    # kubectl create configmap emd-agent-config --from-file=agent.toml -n emd --dry-run=client -o yaml | kubectl apply -f -

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: emd-agent-data
  namespace: emd
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  # Set storageClassName to match your cluster's available storage class.
  # storageClassName: talos-hostpath   # Talos / OpenEBS
  # storageClassName: local-path       # k3s default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emd-agent
  namespace: emd
  labels:
    app: emd-agent
spec:
  replicas: 1
  # Recreate is required with ReadWriteOnce PVCs on local storage.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: emd-agent
  template:
    metadata:
      labels:
        app: emd-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: emd-agent
        image: ghcr.io/cvkitio/emd-agent:latest
        imagePullPolicy: Always
        args:
        - "--config"
        - "/etc/emd-agent/agent.toml"
        - "--api"
        - ":8080"
        - "--metrics"
        - ":9464"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "6Gi"
        env:
        - name: GOMAXPROCS
          value: "8"
        - name: GOMEMLIMIT
          value: "7GiB"
        volumeMounts:
        - name: config
          mountPath: /etc/emd-agent
          readOnly: true
        - name: data
          mountPath: /var/lib/emd-agent
        ports:
        - name: metrics
          containerPort: 9464
          protocol: TCP
        - name: api
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9464
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9464
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: emd-agent-config
      - name: data
        persistentVolumeClaim:
          claimName: emd-agent-data

---
apiVersion: v1
kind: Service
metadata:
  name: emd-agent-metrics
  namespace: emd
  labels:
    app: emd-agent
spec:
  type: ClusterIP
  selector:
    app: emd-agent
  ports:
  - name: metrics
    port: 9464
    targetPort: 9464
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: emd-agent-api
  namespace: emd
  labels:
    app: emd-agent
spec:
  type: ClusterIP
  selector:
    app: emd-agent
  ports:
  - name: api
    port: 8080
    targetPort: 8080
    protocol: TCP

---
# Ingress — fill in your hostname and remove/adjust TLS as needed.
# Requires an ingress controller (e.g. ingress-nginx) and optionally cert-manager.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emd-agent
  namespace: emd
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
  - host: emd-agent.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: emd-agent-api
            port:
              number: 8080
  # tls:
  # - hosts:
  #   - emd-agent.example.com
  #   secretName: emd-agent-tls
