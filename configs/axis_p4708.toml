# AXIS P4708-PLVE Panoramic Camera — live test config
# Camera: 10.45.81.7  Codec: H.264 High, 1920x1080, ~10 fps
# Credentials stored in URL (percent-encode the @ → %40)
#
# Confirm stream is reachable:
#   ffprobe -v quiet -rtsp_transport tcp \
#     "rtsp://root:***REDACTED_PASSWORD***@10.45.81.7/axis-media/media.amp?videocodec=h264" \
#     -show_streams -of json | python3 -m json.tool

[runtime]
log_level        = "info"
metrics_listen   = "0.0.0.0:9464"
clip_root        = "/tmp/emd_axis/clips"
inflight_root    = "/tmp/emd_axis/inflight"

[recording]
container        = "mpegts"
muxer            = "intree"
fsync_policy     = "on_close"

[mqtt]
url              = "mqtt://127.0.0.1:1883"

[disk]
max_bytes_per_camera = 1_000_000_000
retention_days       = 1

# Axis P4708-PLVE runs at 10 fps; adjust off_threshold accordingly
# (off_threshold default is 45 frames — at 10 fps that is 4.5 s of quiet)
[cameras.axis_p4708]
url               = "rtsp://root:***REDACTED_PASSWORD***@10.45.81.7/axis-media/media.amp?videocodec=h264&resolution=1920x1080"
transport         = "tcp"
codec_hint        = "h264"
buffer_seconds    = 15
pre_roll_seconds  = 6
post_roll_seconds = 10
clip_max_seconds  = 120
motion_z_high     = 3.0
intra_ratio_high  = 2.5
on_threshold      = 2
off_threshold     = 15   # ~1.5 × 10 fps
gradual_enabled   = false
