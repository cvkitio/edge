apiVersion: v1
kind: Namespace
metadata:
  name: cvkit
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: cvkit
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data
      max_memory_store: 256MB
      max_file_store: 10GB
    }

    accounts {
      $SYS { users = [{ user: "admin", password: "$NATS_ADMIN_PASSWORD" }] }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: cvkit
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
          env:
            - name: NATS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-credentials
                  key: admin-password
      volumes:
        - name: config
          configMap:
            name: nats-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: cvkit
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
    - name: monitor
      port: 8222
